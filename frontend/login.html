<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body{
            background:#111827;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            width:350px;
            background:#1f2937;
            padding:30px;
            border-radius:15px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:20px;
            border:none;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            font-size:18px;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h1>Doorline Login</h1>

    <input
        id="username"
        placeholder="Benutzername"
    >

    <input
        id="password"
        type="password"
        placeholder="Passwort"
    >

    <button onclick="login()">
        Login
    </button>

</div>

<script>

async function login(){

    const response = await fetch("/login",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            username:
                document.getElementById(
                    "username"
                ).value,

            password:
                document.getElementById(
                    "password"
                ).value
        })
    });

    const data = await response.json();

    if(data.success){
        localStorage.setItem(
            "user",
            data.username
        );

        window.location.href="/";
    }
    else{
        alert("Login fehlgeschlagen");
    }
}

</script>

</body>
</html>
